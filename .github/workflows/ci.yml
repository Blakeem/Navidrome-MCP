name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run linting
      run: pnpm run lint

    - name: Run type checking
      run: pnpm run typecheck

    - name: Run tests (CI mode - skip live integration tests)
      run: pnpm run test:ci
      env:
        # Skip live integration tests in CI
        SKIP_INTEGRATION_TESTS: true
        MOCK_ONLY_TESTS: true
        # Provide dummy values for config validation
        NAVIDROME_URL: http://ci-dummy-server:4533
        NAVIDROME_USERNAME: ci-dummy-user
        NAVIDROME_PASSWORD: ci-dummy-password
        # Disable debug logging
        DEBUG: false

    - name: Build package
      run: pnpm run build